<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title and page.title != site.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  {% feed_meta %}
</head>
<body>
  <div class="canvas">
    <div class="page">

      <header class="site-header">
        <div>
          <div class="site-title"><a href="{{ '/' | relative_url }}">{{ site.title }}</a></div>
          <div class="site-tagline">{{ site.tagline }}</div>
        </div>
        <nav class="site-nav">
          <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>Writing</a>
          <a href="{{ '/about/' | relative_url }}"{% if page.url contains 'about' %} class="active"{% endif %}>About</a>
        </nav>
      </header>

      <main class="site-content">
        {{ content }}
      </main>

      <footer class="site-footer">
        <span>{{ site.author.name }}</span>
        <a href="mailto:{{ site.author.email }}">{{ site.author.email }}</a>
      </footer>

    </div>
  </div>
</body>
</html>
